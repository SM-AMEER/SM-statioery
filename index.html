<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Stationery Store</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            background-color: #f4f4f4;\n            margin: 0;\n            padding: 20px;\n        }\n        h1 {\n            color: #333;\n        }\n        .product {\n            background: #fff;\n            border: 1px solid #ddd;\n            border-radius: 5px;\n            padding: 10px;\n            margin: 10px 0;\n        }\n        .btn {\n            background-color: #28a745;\n            color: white;\n            padding: 10px 20px;\n            border: none;\n            border-radius: 5px;\n            cursor: pointer;\n        }\n        .btn:hover {\n            background-color: #218838;\n        }\n    </style>\n</head>\n<body>\n    <h1>Welcome to Our Stationery Store</h1>\n    <div id=\"products\">\n        <div class=\"product\">\n            <h2>Notebook</h2>\n            <p>Price: $2.50</p>\n            <button class=\"btn\" onclick=\"addToCart('Notebook', 2.50)\">Add to Cart</button>\n        </div>\n        <div class=\"product\">\n            <h2>Pens</h2>\n            <p>Price: $1.20</p>\n            <button class=\"btn\" onclick=\"addToCart('Pens', 1.20)\">Add to Cart</button>\n        </div>\n    </div>\n    <script>\n        let cart = [];\n        function addToCart(item, price) {\n            cart.push({ item, price });\n            alert(item + ' has been added to your cart!');\n        }\n    </script>\n</body>\n</html>\n
