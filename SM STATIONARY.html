<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SM STATIONERY</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
    body { background-color: #f1f3f6; }

    header {
      background-color: #2874f0;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo { color:white; font-size:24px; font-weight:bold; }
    .search-box { flex:1; padding:8px; border-radius:4px; border:none; }
    .nav-right { display:flex; gap:15px; align-items:center; }
    .login-btn, .cart-btn { background:white; color:#2874f0; border:none; padding:8px 15px; font-weight:bold; cursor:pointer; position:relative; border-radius:4px; }
    .cart-count { position:absolute; top:-6px; right:-6px; background:red; color:white; border-radius:50%; padding:2px 6px; font-size:12px; }

    .products {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:20px;
      padding:20px;
    }

    .card {
      background:white;
      padding:15px;
      border-radius:5px;
      text-align:center;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }

    .card h3 { margin-bottom:8px; }
    .price { color:green; font-weight:bold; margin-bottom:10px; }

    .card button { background-color:#ff9f00; border:none; padding:8px 12px; font-weight:bold; cursor:pointer; border-radius:3px; }

    .qty-container { display:flex; justify-content:center; align-items:center; gap:5px; margin-top:10px; }
    .qty-btn { background:#ff9f00; color:white; border:none; padding:4px 8px; cursor:pointer; font-weight:bold; border-radius:3px; }
    .qty-display { min-width:25px; text-align:center; font-weight:bold; }

    /* Cart Panel */
    .cart-panel {
      position:fixed; top:0; right:-350px; width:350px; height:100%; background:white; box-shadow:-2px 0 10px rgba(0,0,0,0.2);
      padding:20px; transition:right 0.3s ease; z-index:1000;
    }
    .cart-panel.open { right:0; }
    .cart-panel h2 { margin-bottom:15px; }
    .cart-item { display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #ddd; padding-bottom:5px; }
    .close-cart { background:red; color:white; border:none; padding:5px 10px; cursor:pointer; float:right; border-radius:3px; }
    .cart-total { font-weight:bold; margin-top:15px; font-size:18px; margin-bottom:10px; }

    .buy-btn { width:100%; margin-top:10px; padding:10px; background:#25D366; border:none; font-size:16px; font-weight:bold; cursor:pointer; border-radius:4px; color:white; }

    select { width:100%; padding:8px; margin-bottom:10px; border-radius:4px; border:1px solid #ccc; }

  </style>
</head>
<body>

  <!-- Navbar -->
  <header>
    <div class="logo">SM STATIONERY</div>
    <input type="text" class="search-box" placeholder="Search for stationery items...">
    <div class="nav-right">
      <button class="login-btn">Login</button>
      <button class="cart-btn" onclick="toggleCart()">Cart
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <!-- Products -->
  <section class="products">
    <div class="card" data-name="Ball Pen Pack" data-price="120">
      <h3>Ball Pen Pack</h3>
      <div class="price">₹120</div>
      <button class="add-btn" onclick="addToCart(this)">Add to Cart</button>
    </div>

    <div class="card" data-name="Notebook" data-price="80">
      <h3>Notebook</h3>
      <div class="price">₹80</div>
      <button class="add-btn" onclick="addToCart(this)">Add to Cart</button>
    </div>

    <div class="card" data-name="Color Pencil Set" data-price="250">
      <h3>Color Pencil Set</h3>
      <div class="price">₹250</div>
      <button class="add-btn" onclick="addToCart(this)">Add to Cart</button>
    </div>

    <div class="card" data-name="Geometry Box" data-price="150">
      <h3>Geometry Box</h3>
      <div class="price">₹150</div>
      <button class="add-btn" onclick="addToCart(this)">Add to Cart</button>
    </div>
  </section>

  <!-- Cart Panel -->
  <div class="cart-panel" id="cartPanel">
    <button class="close-cart" onclick="toggleCart()">X</button>
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <div class="cart-total" id="cartTotal">Total: ₹0</div>

    <!-- Payment Method Dropdown -->
    <label for="paymentMethodSelect"><b>Select Payment Method:</b></label>
    <select id="paymentMethodSelect">
      <option value="UPI">UPI (Online Payment)</option>
      <option value="COD">Cash on Delivery</option>
    </select>

    <button class="buy-btn" onclick="buyNow()">Buy via WhatsApp</button>
  </div>

  <script>
    let cart = {};
    let total = 0;
    let count = 0;

    function addToCart(button) {
      const card = button.parentElement;
      const name = card.dataset.name;
      const price = parseInt(card.dataset.price);

      if (!cart[name]) cart[name] = { price: price, qty: 1 };
      else cart[name].qty++;

      count++;
      updateCart();

      // Replace button with quantity controls
      const qtyContainer = document.createElement("div");
      qtyContainer.className = "qty-container";

      const minusBtn = document.createElement("button");
      minusBtn.innerText = "-";
      minusBtn.className = "qty-btn";
      minusBtn.onclick = () => changeQty(name, -1, qtyDisplay, card);

      const qtyDisplay = document.createElement("span");
      qtyDisplay.className = "qty-display";
      qtyDisplay.innerText = cart[name].qty;

      const plusBtn = document.createElement("button");
      plusBtn.innerText = "+";
      plusBtn.className = "qty-btn";
      plusBtn.onclick = () => changeQty(name, 1, qtyDisplay, card);

      qtyContainer.appendChild(minusBtn);
      qtyContainer.appendChild(qtyDisplay);
      qtyContainer.appendChild(plusBtn);

      button.style.display = "none";
      card.appendChild(qtyContainer);
    }

    function changeQty(name, delta, display, card) {
      cart[name].qty += delta;
      if (cart[name].qty <= 0) {
        delete cart[name];
        count -= 1; 
        card.querySelector(".qty-container").remove();
        card.querySelector(".add-btn").style.display = "inline-block";
      } else {
        count += delta;
        display.innerText = cart[name].qty;
      }
      updateCart();
    }

    function updateCart() {
      const cartItems = document.getElementById("cartItems");
      cartItems.innerHTML = "";
      total = 0;
      for (let item in cart) {
        const itemTotal = cart[item].price * cart[item].qty;
        total += itemTotal;
        cartItems.innerHTML += `<div class="cart-item">
          <span>${item} x ${cart[item].qty}</span>
          <span>₹${itemTotal}</span>
        </div>`;
      }
      document.getElementById("cartTotal").innerText = "Total: ₹" + total;
      document.getElementById("cartCount").innerText = count;
    }

    function toggleCart() {
      document.getElementById("cartPanel").classList.toggle("open");
    }

    function buyNow() {
      if (count === 0) {
        alert("🛒 Your cart is empty!");
        return;
      }

      const paymentMethod = document.getElementById("paymentMethodSelect").value;

      // Prepare WhatsApp message
      let message = "🛒 Order from SM STATIONERY:%0A";
      for (let item in cart) {
        message += `${item} x ${cart[item].qty} = ₹${cart[item].price * cart[item].qty}%0A`;
      }
      message += `Total: ₹${total}%0A`;
      message += `Payment Method: ${paymentMethod}%0A`;
      message += "Please confirm my order.";

      const phoneNumber = "919698637432"; // <-- Your WhatsApp number
      const whatsappUrl = `https://wa.me/${phoneNumber}?text=${message}`;
      window.open(whatsappUrl, "_blank");

      // Clear cart
      cart = {};
      total = 0;
      count = 0;
      updateCart();

      // Close cart panel
      document.getElementById("cartPanel").classList.remove("open");
    }
  </script>

</body>
</html>
